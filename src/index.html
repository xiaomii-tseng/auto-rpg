<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      // Compute effective DPR once so all game modules use the same value.
      // Cap canvas pixels to ~1920×1080 to keep performance on low-end GPUs.
      (function () {
        var raw = window.devicePixelRatio || 1;
        var maxByPixels = Math.sqrt(1920 * 1080 / (window.innerWidth * window.innerHeight));
        window.__gameDpr = Math.min(raw, maxByPixels, 3);
      })();
      // Capture PWA install prompt before Angular boots
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaPrompt = e;
      });
    </script>
    <title>Angular</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
</html>
