<div id="game-wrapper">
  <div id="game-container"></div>
</div>

@if (showAuth) {
  <app-auth (loggedIn)="onLoggedIn()"></app-auth>
}

@if (showMarket()) {
  <app-market></app-market>
}

<app-report></app-report>

@if (showUpdate()) {
  <div class="update-banner">
    <span>遊戲已更新，重新載入以取得最新版本</span>
    <button (click)="applyUpdate()">立刻更新</button>
  </div>
}

@if (showPushPrompt()) {
  <div class="push-prompt">
    <span class="push-prompt__text">🔔 訂閱版本更新通知，有新內容時第一時間告知你</span>
    <div class="push-prompt__actions">
      <button class="push-prompt__btn push-prompt__btn--ok" (click)="onPushSubscribe()">訂閱</button>
      <button class="push-prompt__btn push-prompt__btn--no" (click)="onPushDismiss()">不用了</button>
    </div>
  </div>
}
