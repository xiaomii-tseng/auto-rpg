<div class="affix-guide-overlay" (click)="close()">
  <div class="affix-guide-panel" (click)="$event.stopPropagation()">

    <div class="panel-header">
      <span class="panel-title">裝備詞墜指南</span>
      <button class="close-btn" (click)="close()">✕</button>
    </div>

    <div class="tab-bar">
      @for (tab of tabs; track tab.key) {
        <button
          class="tab-btn"
          [class.active]="activeTab() === tab.key"
          (click)="setTab(tab.key)">
          {{ tab.label }}
        </button>
      }
    </div>

    <div class="entries-list">
      @for (entry of entries; track entry.stat) {
        <div class="affix-card">
          <div class="affix-header">
            <span class="affix-name">{{ entry.name }}</span>
          </div>
          <p class="affix-desc">{{ entry.desc }}</p>
          <div class="slot-tags">
            @for (slot of entry.slots; track slot.label) {
              <span class="slot-tag"
                [style.color]="slot.color"
                [style.border-color]="slot.color">
                {{ slot.label }}
              </span>
            }
          </div>
        </div>
      }
    </div>

  </div>
</div>
