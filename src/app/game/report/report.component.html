@if (visible()) {
  <div class="report-overlay">
    <div class="report-panel">
      <div class="panel-header">
        <span class="panel-title">{{ t('ui.report') }}</span>
        <button class="close-btn" (click)="close()">✕</button>
      </div>

      @if (state() !== 'done') {
        <div class="panel-body">
          <textarea
            class="msg-input"
            [(ngModel)]="message"
            [placeholder]="t('report.placeholder')"
            [disabled]="state() === 'loading'">
          </textarea>

          <label class="file-label" [class.has-file]="!!selectedFile">
            <input type="file" accept="image/*" (change)="onFileChange($event)" style="display:none" #fileInput />
            <span (click)="fileInput.click()">
              {{ selectedFile ? ('✔ ' + fileName) : t('report.attach') }}
            </span>
          </label>

          @if (state() === 'error') {
            <div class="error-msg">
              {{ t('report.error') }}
              <button class="retry-btn" (click)="retry()">{{ t('report.retry') }}</button>
            </div>
          }

          <button class="submit-btn"
            [disabled]="state() === 'loading' || !message.trim()"
            (click)="submit()">
            {{ state() === 'loading' ? t('report.submitting') : t('report.submit') }}
          </button>
        </div>
      } @else {
        <div class="done-msg">{{ t('report.done') }}</div>
      }
    </div>
  </div>
}
