    <meta charset="utf-8">
    <script>
      // Compute effective DPR once so all game modules use the same value.
      // Cap canvas pixels to ~1920×1080 to keep performance on low-end GPUs.
      (function () {
        var raw = window.devicePixelRatio || 1;
        var maxByPixels = Math.sqrt(1920 * 1080 / (window.innerWidth * window.innerHeight));
        window.__gameDpr = Math.min(raw, maxByPixels, 3);
      })();
      // Capture PWA install prompt before Angular boots
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaPrompt = e;
      });
    </script>
